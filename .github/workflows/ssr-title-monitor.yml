name: SSR Title Monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ssr-title-monitor
  cancel-in-progress: true

jobs:
  check-title:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check SSR titles
        shell: pwsh
        run: |
          $sites = @(
              "https://limon-credit.com.ua/uk",
              "https://limon-credit.com.ua/ru",
              "https://moneyveo.ua/uk",
              "https://moneyveo.ua/ru",
              "https://freestyle-credit.com.ua/uk",
              "https://freestyle-credit.com.ua/ru"
          )

          $stateFile = "ssr-title-state.json"
          $logFile = "ssr-title-monitor.log"
          $hasChanges = $false

          $headers = @{
              "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              "Accept" = "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
              "Accept-Language" = "uk-UA,uk;q=0.9"
              "Cache-Control" = "no-cache"
              "Pragma" = "no-cache"
          }

          if (Test-Path $stateFile) {
              $state = Get-Content $stateFile -Raw | ConvertFrom-Json -AsHashtable
          } else {
              $state = @{}
          }

          function Write-MonitorLog($message) {
              $time = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              "$time $message" | Tee-Object -FilePath $logFile -Append
          }

          function Get-SsrTitleTag($url) {
              $response = Invoke-WebRequest `
                  -Uri $url `
                  -Headers $headers `
                  -TimeoutSec 20 `
                  -MaximumRedirection 5

              $html = $response.Content

              if ($html -match '(?is)(<title[^>]*>.*?</title>)') {
                  return $matches[1].Trim()
              }

              return $null
          }

          foreach ($site in $sites) {
              try {
                  $titleTag = Get-SsrTitleTag $site
                  $oldTitleTag = $state[$site]

                  if ($titleTag -ne $oldTitleTag) {
                      Write-MonitorLog "[SSR TITLE CHANGED] $site"
                      Write-MonitorLog "OLD: $oldTitleTag"
                      Write-MonitorLog "NEW: $titleTag"

                      $state[$site] = $titleTag
                      $hasChanges = $true
                  } else {
                      Write-Host "[OK] $site | $titleTag"
                  }
              }
              catch {
                  Write-MonitorLog "[ERROR] $site | $_"
                  $hasChanges = $true
              }
          }

          $state | ConvertTo-Json -Depth 10 | Set-Content $stateFile -Encoding UTF8

          if ($hasChanges) {
              "true" | Set-Content ".has-changes"
          }

      - name: Commit results
        run: |
          if [ ! -f ".has-changes" ]; then
            echo "No SSR title changes. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ssr-title-state.json ssr-title-monitor.log

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SSR title monitor results"
            git push
          fi
